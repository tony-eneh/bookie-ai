services:
  postgres:
    image: postgres:16
    container_name: bookieai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bookieai
      POSTGRES_USER: bookieai
      POSTGRES_PASSWORD: bookieai
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - bookieai-network

  redis:
    image: redis:7
    container_name: bookieai-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - bookieai-network

volumes:
  postgres-data:
  redis-data:

networks:
  bookieai-network:
    driver: bridge
